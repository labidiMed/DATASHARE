services:

  db:
    image: postgres:16-alpine
    container_name: datashare-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: datashare-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: ./backend
    container_name: datashare-scheduler
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    command: sh -c "composer install --no-interaction && php artisan schedule:work"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: datashare-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  db-data:
  frontend-node-modules:
